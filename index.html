<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafe POS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app" id="appRoot">
  <div class="left">
    <div class="topbar">
      <span class="brand"><i class="ti ti-coffee" aria-hidden="true"></i>Cafe <span>POS</span></span>
      <span class="orderNo" id="orderNo">Next OR-000001</span>
    </div>
    <div class="searchRow">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input id="search" type="text" placeholder="Search this category" oninput="onSearch(this.value)" aria-label="Search items in this category">
    </div>
    <div class="cats" id="cats"></div>
    <div class="menu" id="menu"></div>
  </div>

  <button class="sheetHandle" onclick="toggleOrderPanel()" aria-label="Toggle order panel">
    <span class="sheetSummary" id="sheetSummary">No items yet</span>
    <i class="ti ti-chevron-up" aria-hidden="true"></i>
  </button>

  <div class="right">
    <div class="ohd">Current order <button class="clr" onclick="clearAll()">Clear all</button></div>
    <div class="olist" id="olist"></div>

    <div class="orderFoot">
      <div class="discRow">
        <select id="discountType" onchange="setDiscountType(this.value)" aria-label="Discount type">
          <option value="percent">% off</option>
          <option value="amount">₱ off</option>
        </select>
        <input id="discountValue" type="number" min="0" step="1" value="0" oninput="setDiscountValue(this.value)" aria-label="Discount value" placeholder="0">
      </div>

      <div class="div"></div>
      <div class="srow"><span>Subtotal</span><span id="sub">₱0.00</span></div>
      <div class="srow" id="discRow" style="display:none"><span>Discount</span><span id="disc">−₱0.00</span></div>
      <div class="srow"><span>Tax (12%)</span><span id="tax">₱0.00</span></div>
      <div class="trow"><span>Total</span><span id="tot">₱0.00</span></div>

      <div class="payMethods">
        <button class="pm on" id="payCash" onclick="setPaymentMethod('cash')"><i class="ti ti-cash" aria-hidden="true"></i>Cash</button>
        <button class="pm" id="payCard" onclick="setPaymentMethod('card')"><i class="ti ti-credit-card" aria-hidden="true"></i>Card</button>
      </div>

      <div class="cashPanel" id="cashPanel">
        <div class="cashRow">
          <label for="cashInput">Cash tendered</label>
          <input id="cashInput" type="number" min="0" step="1" placeholder="0" oninput="updateCash(this.value)" aria-label="Cash tendered amount">
        </div>
        <div class="srow" id="changeRow"><span>Change</span><span id="changeOut">₱0.00</span></div>
      </div>

      <button class="pay" id="pay" onclick="openPreview()" disabled>
        <i class="ti ti-receipt" aria-hidden="true"></i>Review &amp; charge
      </button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="preview">
    <div class="prevHd">Receipt preview <button class="iconbtn" aria-label="Close preview" onclick="closePreview()"><i class="ti ti-x" aria-hidden="true"></i></button></div>
    <div class="prevLines" id="prevLines"></div>
    <div class="div"></div>
    <div class="srow"><span>Subtotal</span><span id="prevSub">₱0.00</span></div>
    <div class="srow" id="prevDiscRow" style="display:none"><span>Discount</span><span id="prevDisc">−₱0.00</span></div>
    <div class="srow"><span>Tax (12%)</span><span id="prevTax">₱0.00</span></div>
    <div class="trow"><span>Total</span><span id="prevTot">₱0.00</span></div>
    <div class="div"></div>
    <div class="srow"><span>Payment method</span><span id="prevMethod">Cash</span></div>
    <div class="srow" id="prevCashRow"><span>Tendered</span><span id="prevTendered">₱0.00</span></div>
    <div class="srow" id="prevChangeRow"><span>Change</span><span id="prevChange">₱0.00</span></div>
    <div class="prevActions">
      <button class="ghostBtn" onclick="closePreview()">Back</button>
      <button class="pay" id="confirmCharge" onclick="confirmCharge()"><i class="ti ti-check" aria-hidden="true"></i>Confirm charge</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" aria-live="polite"></div>

<script src="script.js"></script>
</body>
</html>
